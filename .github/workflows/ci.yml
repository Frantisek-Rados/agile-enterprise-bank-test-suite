name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create database and tables
        run: |
          # Vytvorenie databázy a tabuliek
          sqlite3 bank_test.db <<EOF
          CREATE TABLE IF NOT EXISTS users (
              user_id INTEGER PRIMARY KEY AUTOINCREMENT,
              username TEXT NOT NULL UNIQUE,
              email TEXT NOT NULL UNIQUE,
              password_hash TEXT NOT NULL,
              full_name TEXT,
              created_at TEXT DEFAULT (DATETIME('now'))
          );
          CREATE TABLE IF NOT EXISTS accounts (
              account_id INTEGER PRIMARY KEY AUTOINCREMENT,
              user_id INTEGER NOT NULL,
              account_type TEXT NOT NULL,
              balance REAL DEFAULT 0,
              currency TEXT DEFAULT 'EUR',
              created_at TEXT DEFAULT (DATETIME('now')),
              FOREIGN KEY (user_id) REFERENCES users(user_id)
          );
          CREATE TABLE IF NOT EXISTS trans (
              transaction_id INTEGER PRIMARY KEY AUTOINCREMENT,
              from_account_id INTEGER NOT NULL,
              to_account_id INTEGER NOT NULL,
              amount REAL NOT NULL,
              transaction_date TEXT DEFAULT (DATETIME('now')),
              status TEXT DEFAULT 'pending',
              description TEXT,
              FOREIGN KEY (from_account_id) REFERENCES accounts(account_id),
              FOREIGN KEY (to_account_id) REFERENCES accounts(account_id)
          );
          -- Vloženie testovacích dát
          INSERT OR IGNORE INTO users (user_id, username, email, password_hash, full_name)
          VALUES (1, 'john_doe', 'john@example.com', 'hash123', 'John Doe');
          INSERT OR IGNORE INTO users (user_id, username, email, password_hash, full_name)
          VALUES (2, 'jane_smith', 'jane@example.com', 'hash456', 'Jane Smith');
          INSERT OR IGNORE INTO accounts (account_id, user_id, account_type, balance, currency)
          VALUES (1, 1, 'current', 1500.00, 'EUR');
          INSERT OR IGNORE INTO accounts (account_id, user_id, account_type, balance, currency)
          VALUES (2, 2, 'savings', 500.00, 'EUR');
          EOF

      - name: Run DB integration test
        run: |
          pytest database/test_db_integration.py -v