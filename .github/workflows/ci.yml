name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create test database
        run: |
          sqlite3 bank_test.db "CREATE TABLE users (user_id INTEGER PRIMARY KEY AUTOINCREMENT, username TEXT NOT NULL UNIQUE, email TEXT NOT NULL UNIQUE, password_hash TEXT NOT NULL, full_name TEXT, created_at TEXT DEFAULT (DATETIME('now')));"
          sqlite3 bank_test.db "CREATE TABLE accounts (account_id INTEGER PRIMARY KEY AUTOINCREMENT, user_id INTEGER NOT NULL, account_type TEXT NOT NULL, balance REAL DEFAULT 0, currency TEXT DEFAULT 'EUR', created_at TEXT DEFAULT (DATETIME('now')), FOREIGN KEY (user_id) REFERENCES users(user_id));"
          sqlite3 bank_test.db "CREATE TABLE trans (transaction_id INTEGER PRIMARY KEY AUTOINCREMENT, from_account_id INTEGER NOT NULL, to_account_id INTEGER NOT NULL, amount REAL NOT NULL, transaction_date TEXT DEFAULT (DATETIME('now')), status TEXT DEFAULT 'pending', description TEXT, FOREIGN KEY (from_account_id) REFERENCES accounts(account_id), FOREIGN KEY (to_account_id) REFERENCES accounts(account_id));"
          sqlite3 bank_test.db "INSERT INTO users (username, email, password_hash, full_name) VALUES ('john_doe', 'john@example.com', 'hash123', 'John Doe'), ('jane_smith', 'jane@example.com', 'hash456', 'Jane Smith');"
          sqlite3 bank_test.db "INSERT INTO accounts (user_id, account_type, balance, currency) VALUES (1, 'current', 1500.00, 'EUR'), (2, 'savings', 500.00, 'EUR');"
          sqlite3 bank_test.db "INSERT INTO trans (from_account_id, to_account_id, amount, status, description) VALUES (1, 2, 100.00, 'completed', 'Payment for services');"

      - name: Run DB integration test
        run: |
          pytest database/test_db_integration.py -v